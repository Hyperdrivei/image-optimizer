<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Optimizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui, sans-serif); background: transparent; color: var(--color-text-primary); padding: 1rem 0; font-size: 15px; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
  h3 { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; }
  .section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg, 12px); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .drop-zone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg, 12px); padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s; }
  .drop-zone:hover, .drop-zone.drag-over { background: var(--color-background-secondary); }
  .drop-zone svg { display: block; margin: 0 auto 0.75rem; opacity: 0.4; }
  .drop-zone p { color: var(--color-text-secondary); font-size: 14px; }
  .drop-zone strong { color: var(--color-text-primary); font-weight: 500; }
  #fileInput { display: none; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }
  label.option-label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  input[type=range] { width: 100%; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row input[type=range] { flex: 1; }
  .range-val { font-size: 13px; font-weight: 500; min-width: 32px; text-align: right; }
  .checkbox-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 4px; }
  .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
  .resize-toggle { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; margin-bottom: 0.75rem; }
  #resizeOptions { display: none; }
  .resize-fields { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .resize-fields input[type=number] { width: 100%; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md, 8px); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; }
  .resize-fields span { text-align: center; color: var(--color-text-tertiary); font-size: 13px; }
  .file-list { display: flex; flex-direction: column; gap: 8px; }
  .file-item { display: grid; grid-template-columns: 40px 1fr auto auto; align-items: center; gap: 10px; padding: 10px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md, 8px); font-size: 13px; }
  .file-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; }
  .file-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { color: var(--color-text-secondary); font-size: 12px; }
  .file-status { font-size: 12px; }
  .file-remove { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 18px; line-height: 1; padding: 0 2px; }
  .file-remove:hover { color: var(--color-text-danger, #e24b4a); }
  .btn-primary { width: 100%; padding: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md, 8px); font-size: 15px; font-weight: 500; cursor: pointer; color: var(--color-text-primary); transition: background 0.15s; margin-top: 0.5rem; }
  .btn-primary:hover { background: var(--color-background-secondary); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .progress-bar-wrap { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
  .progress-bar { height: 100%; width: 0%; background: var(--color-text-info, #378add); transition: width 0.2s; }
  .results-list { display: flex; flex-direction: column; gap: 8px; }
  .result-item { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md, 8px); font-size: 13px; }
  .result-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-meta { color: var(--color-text-secondary); font-size: 12px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .badge-success { background: var(--color-background-success); color: var(--color-text-success); }
  .badge-warn { background: var(--color-background-warning); color: var(--color-text-warning); }
  .btn-dl { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md, 8px); background: transparent; cursor: pointer; color: var(--color-text-primary); white-space: nowrap; }
  .btn-dl:hover { background: var(--color-background-secondary); }
  .btn-dl-all { display: none; }
  .empty-state { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
  .fit-mode { display: flex; gap: 8px; margin-top: 8px; }
  .fit-btn { flex: 1; padding: 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md, 8px); background: transparent; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); }
  .fit-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
</style>
</head>
<body>
<h2>Image optimizer</h2>

<div class="section">
  <div class="drop-zone" id="dropZone">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <p><strong>Drop images here</strong> or <strong id="browseLink" style="cursor:pointer;text-decoration:underline;">browse</strong></p>
    <p style="margin-top:4px;">JPEG, PNG, GIF, WebP, AVIF supported</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>
  <div id="fileListWrap" style="display:none; margin-top:1rem;">
    <div class="file-list" id="fileList"></div>
  </div>
</div>

<div class="section">
  <h3>Output format</h3>
  <div class="checkbox-group">
    <label><input type="checkbox" id="fmtWebp" checked> WebP</label>
    <label><input type="checkbox" id="fmtAvif"> AVIF</label>
    <label><input type="checkbox" id="fmtJpeg"> JPEG</label>
    <label><input type="checkbox" id="fmtPng"> PNG</label>
  </div>
</div>

<div class="section">
  <h3>Compression</h3>
  <div class="options-grid">
    <div>
      <label class="option-label">Quality target</label>
      <div class="range-row">
        <input type="range" id="quality" min="10" max="100" value="82" step="1">
        <span class="range-val" id="qualityVal">82</span>
      </div>
    </div>
    <div>
      <label class="option-label">Max file size (KB)</label>
      <div class="range-row">
        <input type="range" id="maxSize" min="10" max="500" value="100" step="5">
        <span class="range-val" id="maxSizeVal">100 KB</span>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <label class="resize-toggle">
    <input type="checkbox" id="enable2x">
    <span>Also generate a 2x version (double width &amp; height)</span>
  </label>
  <label class="resize-toggle" style="margin-top:0.5rem;">
    <input type="checkbox" id="enableResize">
    <span>Resize before compressing</span>
  </label>
  <div id="resizeOptions">
    <div class="resize-fields">
      <div>
        <label class="option-label">Max width (px)</label>
        <input type="number" id="maxW" placeholder="e.g. 1920" min="1" value="1920">
      </div>
      <span style="margin-top:18px;">×</span>
      <div>
        <label class="option-label">Max height (px)</label>
        <input type="number" id="maxH" placeholder="e.g. 1080" min="1" value="1080">
      </div>
    </div>
    <div class="fit-mode">
      <button class="fit-btn active" data-fit="contain">Contain (keep ratio)</button>
      <button class="fit-btn" data-fit="cover">Cover (crop to fit)</button>
      <button class="fit-btn" data-fit="stretch">Stretch (exact)</button>
    </div>
  </div>
</div>

<button class="btn-primary" id="processBtn" disabled>Compress images</button>
<div class="progress-bar-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>

<div id="resultsSection" style="display:none; margin-top:1rem;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
    <h3 style="margin:0;">Results</h3>
    <button class="btn-dl btn-dl-all" id="dlAllBtn">Download all</button>
  </div>
  <div class="results-list" id="resultsList"></div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileListWrap = document.getElementById('fileListWrap');
const fileListEl = document.getElementById('fileList');
const processBtn = document.getElementById('processBtn');
const qualitySlider = document.getElementById('quality');
const qualityVal = document.getElementById('qualityVal');
const maxSizeSlider = document.getElementById('maxSize');
const maxSizeVal = document.getElementById('maxSizeVal');
const enableResize = document.getElementById('enableResize');
const resizeOptions = document.getElementById('resizeOptions');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const resultsSection = document.getElementById('resultsSection');
const resultsList = document.getElementById('resultsList');
const dlAllBtn = document.getElementById('dlAllBtn');

let files = [];
let fitMode = 'contain';
let results = [];

document.getElementById('browseLink').onclick = () => fileInput.click();
dropZone.onclick = (e) => { if (e.target.id !== 'browseLink') fileInput.click(); };

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener('change', () => addFiles(Array.from(fileInput.files)));

document.querySelectorAll('.fit-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    fitMode = btn.dataset.fit;
    document.querySelectorAll('.fit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

qualitySlider.oninput = () => qualityVal.textContent = qualitySlider.value;
maxSizeSlider.oninput = () => maxSizeVal.textContent = maxSizeSlider.value + ' KB';
enableResize.onchange = () => resizeOptions.style.display = enableResize.checked ? 'block' : 'none';

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

function addFiles(incoming) {
  const imgs = incoming.filter(f => f.type.startsWith('image/'));
  imgs.forEach(f => { if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f); });
  renderFileList();
}

function renderFileList() {
  if (!files.length) { fileListWrap.style.display = 'none'; processBtn.disabled = true; return; }
  fileListWrap.style.display = 'block';
  processBtn.disabled = false;
  fileListEl.innerHTML = '';
  files.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `<img class="file-thumb" src="${url}"><div><div class="file-name">${f.name}</div><div class="file-size">${fmtSize(f.size)}</div></div><div></div><button class="file-remove" data-i="${i}">×</button>`;
    fileListEl.appendChild(item);
  });
  fileListEl.querySelectorAll('.file-remove').forEach(btn => {
    btn.onclick = () => { files.splice(+btn.dataset.i, 1); renderFileList(); };
  });
}

function getFormats() {
  const fmts = [];
  if (document.getElementById('fmtWebp').checked) fmts.push('webp');
  if (document.getElementById('fmtAvif').checked) fmts.push('avif');
  if (document.getElementById('fmtJpeg').checked) fmts.push('jpeg');
  if (document.getElementById('fmtPng').checked) fmts.push('png');
  return fmts.length ? fmts : ['webp'];
}

function getBaseName(name) {
  return name.replace(/\.[^.]+$/, '');
}

function resizeImage(img, maxW, maxH, mode, srcCanvas) {
  const sw = img.width, sh = img.height;
  const src = srcCanvas || img;
  const rw = maxW / sw, rh = maxH / sh;
  if (mode === 'contain') {
    const r = Math.min(1, Math.min(rw, rh));
    const dw = Math.round(sw * r), dh = Math.round(sh * r);
    const c = document.createElement('canvas');
    c.width = dw; c.height = dh;
    c.getContext('2d').drawImage(src, 0, 0, dw, dh);
    return c;
  } else if (mode === 'stretch') {
    const dw = Math.min(sw, maxW), dh = Math.min(sh, maxH);
    const c = document.createElement('canvas');
    c.width = dw; c.height = dh;
    c.getContext('2d').drawImage(src, 0, 0, dw, dh);
    return c;
  } else {
    const r = Math.max(rw, rh);
    const tw = Math.round(sw * r), th = Math.round(sh * r);
    const ox = (tw - maxW) / 2, oy = (th - maxH) / 2;
    const c = document.createElement('canvas');
    c.width = Math.min(sw, maxW); c.height = Math.min(sh, maxH);
    c.getContext('2d').drawImage(src, -ox, -oy, tw, th);
    return c;
  }
}

async function compressToTarget(canvas, mimeType, targetBytes, startQ) {
  let lo = 10, hi = startQ, best = null;
  for (let i = 0; i < 8; i++) {
    const q = Math.round((lo + hi) / 2);
    const blob = await canvasToBlob(canvas, mimeType, q / 100);
    if (blob.size <= targetBytes) { best = { blob, q }; lo = q + 1; }
    else hi = q - 1;
    if (lo > hi) break;
  }
  if (!best) best = { blob: await canvasToBlob(canvas, mimeType, 10 / 100), q: 10 };
  return best;
}

function canvasToBlob(canvas, type, quality) {
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

function loadImage(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}

processBtn.addEventListener('click', async () => {
  if (!files.length) return;
  const fmts = getFormats();
  const maxKB = +maxSizeSlider.value * 1024;
  const startQ = +qualitySlider.value;
  const doResize = enableResize.checked;
  const do2x = document.getElementById('enable2x').checked;
  const maxW = parseInt(document.getElementById('maxW').value) || 1920;
  const maxH = parseInt(document.getElementById('maxH').value) || 1080;

  processBtn.disabled = true;
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';
  resultsSection.style.display = 'none';
  resultsList.innerHTML = '';
  results = [];
  dlAllBtn.style.display = 'none';

  const variants = do2x ? ['1x', '2x'] : ['1x'];
  const total = files.length * fmts.length * variants.length;
  let done = 0;

  for (const file of files) {
    let img;
    try { img = await loadImage(file); } catch { done += fmts.length * variants.length; continue; }

    for (const variant of variants) {
      const scale = variant === '2x' ? 2 : 1;

      let canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);

      if (doResize) canvas = resizeImage({ width: canvas.width, height: canvas.height, _canvas: canvas }, maxW * scale, maxH * scale, fitMode, canvas);

      for (const fmt of fmts) {
        const mime = fmt === 'jpeg' ? 'image/jpeg' : fmt === 'png' ? 'image/png' : fmt === 'avif' ? 'image/avif' : 'image/webp';
        let blob, finalQ;
        if (fmt === 'png') {
          blob = await canvasToBlob(canvas, mime, 1);
          finalQ = null;
        } else {
          const res2 = await compressToTarget(canvas, mime, maxKB, startQ);
          blob = res2.blob; finalQ = res2.q;
        }
        const suffix = variant === '2x' ? '@2x' : '';
        const outName = getBaseName(file.name) + suffix + '.' + fmt;
        results.push({ blob, name: outName, origSize: file.size, fmt, q: finalQ, variant });
        done++;
        progressBar.style.width = Math.round(done / total * 100) + '%';
      }
    }
  }

  renderResults();
  processBtn.disabled = false;
  progressWrap.style.display = 'none';
});

function renderResults() {
  resultsSection.style.display = 'block';
  resultsList.innerHTML = '';
  results.forEach((r, i) => {
    const pct = Math.round((1 - r.blob.size / r.origSize) * 100);
    const underTarget = r.blob.size <= +maxSizeSlider.value * 1024;
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <div>      <div class="result-name">${r.name}${r.variant === '2x' ? ' <span style="font-size:11px;padding:1px 6px;border-radius:4px;background:var(--color-background-info);color:var(--color-text-info);font-weight:500;">2x</span>' : ''}</div><div class="result-meta">${fmtSize(r.origSize)} → ${fmtSize(r.blob.size)}${r.q !== null ? ' · q' + r.q : ''} · ${pct >= 0 ? '-' + pct : '+' + Math.abs(pct)}%</div></div>
      <span class="badge ${underTarget ? 'badge-success' : 'badge-warn'}">${underTarget ? 'Under 100 KB' : 'Over 100 KB'}</span>
      <button class="btn-dl" data-i="${i}">Download</button>`;
    resultsList.appendChild(item);
  });
  resultsList.querySelectorAll('.btn-dl').forEach(btn => {
    btn.onclick = () => { const r = results[+btn.dataset.i]; downloadBlob(r.blob, r.name); };
  });
  if (results.length > 1) { dlAllBtn.style.display = 'inline-block'; dlAllBtn.onclick = dlAll; }
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
}

async function dlAll() {
  for (const r of results) {
    downloadBlob(r.blob, r.name);
    await new Promise(res => setTimeout(res, 80));
  }
}
</script>
</body>
</html>
